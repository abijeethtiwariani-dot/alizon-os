<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, follow">
<title>Offline — Alizon OS</title>
<meta name="theme-color" content="#8c1515">
<style>
  html,body{margin:0;height:100%;background:linear-gradient(180deg,#8c1515,#6b0f0f);color:#fff;
    font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:28px}
  img{width:72px;height:72px;object-fit:contain;filter:drop-shadow(0 6px 16px rgba(0,0,0,.35))}
  h1{font-size:22px;margin:6px 0 0;letter-spacing:.5px}
  p{margin:0;opacity:.9;font-size:15px;max-width:320px;line-height:1.6}
  button{margin-top:10px;background:#fff;color:#8c1515;border:none;border-radius:100px;
    padding:13px 30px;font-size:15px;font-weight:700;cursor:pointer}
  small{opacity:.7;font-size:12.5px;margin-top:4px}
</style>
</head>
<body>
  <div class="wrap">
    <img src="/alizon-logo.png" alt="Alizon" onerror="this.style.display='none'">
    <h1>You're offline</h1>
    <p>Alizon OS needs an internet connection to load fresh results, notices and documents.</p>
    <button onclick="location.reload()">Try again</button>
    <small>Any pages you've already opened stay available offline.</small>
  </div>
</body>
</html>
