<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Serif+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALIZON OS · ID Card Studio</title>
<meta name="robots" content="noindex,nofollow">
<script src="firebase-sync.js"></script>
<style>
  :root{
    --bg:#070810; --ink:#f5f4f6; --muted:#9a9db2; --line:rgba(255,255,255,.10);
    --crimson:#C40D16; --crimson-deep:#B1040E; --gold:#D9A441; --gold-soft:rgba(217,164,65,.14);
    --pill:rgba(255,255,255,.05);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Source Sans 3','Source Sans Pro',-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  h1,h2,h3{font-family:'Source Serif Pro',Georgia,serif;font-weight:600;letter-spacing:-.01em}
  .bgwrap{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(120% 80% at 50% -10%,rgba(212,24,32,.09),transparent 60%),radial-gradient(90% 60% at 90% 10%,rgba(217,164,65,.06),transparent 55%)}
  .top{position:sticky;top:0;z-index:10;background:rgba(13,16,36,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .top .in{max-width:1080px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;gap:13px}
  .top img.logo{width:32px;height:32px;object-fit:contain;flex:none}
  .top .bt b{font-family:'Source Serif Pro',serif;font-size:16px;display:block;line-height:1.1}
  .top .bt small{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
  .top .sp{margin-left:auto;display:flex;gap:9px;align-items:center}
  .top a{font-size:13px;text-decoration:none;color:var(--ink);border:1px solid var(--line);background:var(--pill);padding:9px 15px;border-radius:100px}
  .top a:hover{border-color:rgba(217,164,65,.4)}
  .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:24px 22px 80px}
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .cat{cursor:pointer;font-weight:600;font-size:13.5px;border:1px solid var(--line);background:var(--pill);color:var(--ink);border-radius:100px;padding:10px 18px}
  .cat.on{border:none;color:#fff;background:linear-gradient(120deg,var(--crimson-deep),var(--crimson))}
  .cat.bulk{margin-left:auto;color:var(--gold);border-color:rgba(217,164,65,.4)}
  .cat.bulk.on{background:linear-gradient(120deg,#8a6a12,var(--gold));color:#111}
  .grid{display:grid;grid-template-columns:340px 1fr;gap:22px}
  .grid.solo{grid-template-columns:1fr;max-width:560px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .panel{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.03);padding:16px}
  .search{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:10px;padding:11px 13px;outline:none;margin-bottom:10px}
  .search:focus{border-color:var(--gold)}
  .plist{max-height:62vh;overflow:auto;display:flex;flex-direction:column;gap:4px}
  .prow{cursor:pointer;padding:10px 12px;border-radius:10px;border:1px solid transparent;display:flex;flex-direction:column;gap:1px}
  .prow:hover{background:rgba(255,255,255,.05)}
  .prow.on{background:var(--gold-soft);border-color:rgba(217,164,65,.4)}
  .prow b{font-size:13.5px;font-weight:600}
  .prow small{font-size:11.5px;color:var(--muted);font-family:ui-monospace,Menlo,monospace}
  .empty{color:var(--muted);font-size:13px;padding:22px;text-align:center}
  .stage{display:flex;flex-direction:column;align-items:center;gap:16px}
  .stagehint{font-size:12.5px;color:var(--muted)}
  .btnrow{display:flex;gap:9px;flex-wrap:wrap;justify-content:center}
  .abtn{cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;border:1px solid var(--line);background:var(--pill);color:var(--ink);border-radius:100px;padding:11px 18px}
  .abtn:hover{border-color:var(--gold);color:var(--gold)}
  .abtn.primary{border:none;color:#fff;background:linear-gradient(120deg,var(--crimson-deep),var(--crimson))}
  .abtn.primary:hover{color:#fff}

  /* ===== the ID card — corporate ===== */
  .idcard{width:320px;height:504px;border-radius:14px;overflow:hidden;background:#fff;color:#1a1a1a;position:relative;
    box-shadow:0 24px 60px rgba(0,0,0,.55);font-family:'Inter',sans-serif;border:1px solid rgba(0,0,0,.08)}
  .idc-head{background:linear-gradient(120deg,#5c0d0d,#8c1515 70%,#a31212);color:#fff;padding:14px 16px 12px;display:flex;gap:11px;align-items:center;text-align:left;border-bottom:3px solid #D9A441}
  .idc-head img{width:34px;height:34px;object-fit:contain;flex:none;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
  .idc-head .nm{font-family:'Source Serif Pro',Georgia,serif;font-weight:600;font-size:13px;line-height:1.18}
  .idc-head .sc{font-size:7.5px;letter-spacing:.22em;text-transform:uppercase;opacity:.85;margin-top:2px}
  .idc-ribbon{background:#1b1414;color:#D9A441;text-align:center;font-size:9px;font-weight:800;letter-spacing:.26em;text-transform:uppercase;padding:6px 8px}
  .idc-body{padding:18px 18px 12px;text-align:center}
  .idc-photo{width:112px;height:112px;border-radius:14px;margin:0 auto;display:grid;place-items:center;color:#fff;font-family:'Source Serif Pro',serif;font-weight:700;font-size:38px;overflow:hidden;
    background:linear-gradient(135deg,#7a1010,#a31212);border:3px solid #fff;outline:2px solid #D9A441;box-shadow:0 8px 20px rgba(60,8,8,.25)}
  .idc-photo img{width:100%;height:100%;object-fit:cover;display:block}
  .idc-name{font-family:'Source Serif Pro',Georgia,serif;font-weight:700;font-size:18.5px;margin-top:12px;color:#231D1E;line-height:1.15}
  .idc-id{display:inline-block;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#7A0309;font-weight:700;margin-top:5px;background:rgba(140,21,21,.08);border:1px solid rgba(140,21,21,.18);border-radius:100px;padding:3px 14px;letter-spacing:.06em}
  .idc-rows{margin:12px 4px 0;text-align:left}
  .idc-r{display:flex;gap:10px;align-items:baseline;padding:5.5px 2px;border-bottom:1px dashed rgba(0,0,0,.1)}
  .idc-r:last-child{border-bottom:none}
  .idc-r .k{flex:none;width:86px;font-size:8.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#9a8a6a}
  .idc-r .v{font-size:11.5px;font-weight:600;color:#231D1E;line-height:1.3}
  .idc-foot{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:3px solid #7A0309;padding:8px 14px 9px;display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
  .idc-bars{display:flex;gap:2px;align-items:flex-end;height:24px}
  .idc-bars i{display:block;width:2px;background:#7A0309;border-radius:1px}
  .idc-foot .sg{font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:#8A8384;text-align:right;line-height:1.4}
  .idc-foot .sg b{display:block;font-family:'Source Serif Pro',Georgia,serif;font-style:italic;font-size:11px;color:#231D1E;text-transform:none;letter-spacing:0}
  .phbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;margin-top:2px}
  .phbar input[type=file]{font-size:11.5px;color:var(--muted);max-width:210px}
  /* bulk sheet */
  .sheet{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;justify-items:center}

  /* print */
  @media print{
    body>*{display:none !important}
    #printArea{display:block !important;position:static;background:#fff}
    #printArea .idcard{box-shadow:none;margin:0 auto 12mm;page-break-inside:avoid}
    #printArea.sheet{display:grid !important;grid-template-columns:repeat(2,1fr);gap:10mm}
    @page{margin:12mm}
  }
  #printArea{display:none}
</style>

<body>
<div class="bgwrap"></div>

<div class="top"><div class="in">
  <img class="logo" src="alizon-logo.png" alt="" onerror="this.style.display='none'">
  <div class="bt"><b>ID Card Studio</b><small>ALIZON OS</small></div>
  <div class="sp"><a href="ASMDI-dashboard.html" target="_top" id="idcBack">← Dashboard</a></div>
</div></div>

<div class="wrap">
  <div class="cats" id="cats">
    <button class="cat on" data-cat="student">Student</button>
    <button class="cat" data-cat="faculty">Faculty</button>

      <div class="stage" id="stage"><div class="empty">Pick a person on the left to generate their ID card.</div></div>

  <div class="panel" id="selfLookup" style="display:none;max-width:520px">
    <b style="font-size:14px">Get my ID card</b>
    <div class="stagehint" style="margin:6px 0 12px">Select your category and enter your ID to view your own card.</div>
    <div class="cats" id="selfCats" style="margin-bottom:12px">
      <button class="cat on" data-cat="student" type="button">Student</button>
      <button class="cat" data-cat="faculty" type="button">Faculty</button>

</div>

<div id="printArea"></div>

<script>
var $=function(id){return document.getElementById(id);};
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function J(k,d){try{var v=JSON.parse(localStorage.getItem(k));return v==null?d:v;}catch(e){return d;}}
var OFFICES={tvm:'Thiruvananthapuram (HQ)',delhi:'New Delhi',blr:'Bengaluru',usa:'USA Chapter'};
var LOGO_SRC='alizon-logo.png';
function initials(n){return String(n||'?').trim().split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase()||'?';}

/* ---- normalise each source into a common card model ---- */
function students(){return (J('alizonStudents',[])||[]).filter(function(s){return s&&(s.reg||s.name);});}
function faculty(){return (J('alizonFaculty',[])||[]).filter(function(f){return f&&(f.name||f.email);});}
function employees(){var d=J('alizonHR',{});return (d&&Array.isArray(d.EMP)?d.EMP:[]).filter(function(e){return e&&(e.empid||e.name);});}

function model(cat, r){
  if(cat==='student'){
    return {id:r.reg||'—', name:(r.salutation?r.salutation+' ':'')+ (r.name||'Student'),
      role:'Student', line1:r.programme||r.course||'', line2:r.batch?(/^\s*batch/i.test(r.batch)?r.batch:('Batch '+r.batch)):'',
      photo:(r.photo||r.photoUrl||r.pic||''),
      search:[r.reg,r.name,r.batch,r.programme,r.email].join(' ').toLowerCase(), batch:r.batch||'—', raw:r};
  }
  if(cat==='faculty'){
    return {id:r.id||r.email||'—', name:(r.salut?r.salut+' ':'')+(r.name||'Faculty'),
      role:'Faculty', line1:r.desig||'Faculty Member', line2:r.dept||r.department||'',
      photo:(r.photo||r.photoUrl||r.pic||''),
      search:[r.name,r.email,r.dept,r.desig].join(' ').toLowerCase(), batch:'Faculty', raw:r};
  }
  return {id:r.empid||'—', name:(r.salut?r.salut+' ':'')+(r.name||'Employee'),
    role:'Employee', line1:r.desig||(r.emptype||'Staff'), line2:(OFFICES[r.office]||r.office||''),
    photo:(r.photo||r.photoUrl||r.pic||''),
    search:[r.empid,r.name,r.desig,r.dept,r.office].join(' ').toLowerCase(), batch:'Staff', raw:r};
}
function listFor(cat){
  var src = cat==='student'?students():cat==='faculty'?faculty():employees();
  return src.map(function(r){return model(cat,r);});
}

/* ---- card HTML ---- */
function barsHtml(id){
  var s=String(id||'0'), out='';
  for(var i=0;i<38;i++){ var code=s.charCodeAt(i%s.length)||48; var h=8+((code*(i+3))%18); out+='<i style="height:'+h+'px"></i>'; }
  return out;
}
function cardHtml(m){
  var role=m.role==='Student'?'Student Identity Card':m.role==='Faculty'?'Faculty Identity Card':'Employee Identity Card';
  var k1=m.role==='Student'?'Programme':'Designation';
  var k2=m.role==='Student'?'Batch':(m.role==='Faculty'?'Department':'Office');
  var sig=m.role==='Student'?'Registrar':'HR Office';
  var ph=photoUrlFor(m);
  return '<div class="idcard">'+
    '<div class="idc-head"><img src="'+LOGO_SRC+'" onerror="this.style.display=\'none\'">'+
      '<div><div class="nm">Alizon School of Medical<br>&amp; Digital Intelligence</div>'+
      '<div class="sc">Thiruvananthapuram · alizon.in</div></div></div>'+
    '<div class="idc-ribbon">'+role+'</div>'+
    '<div class="idc-body">'+
      '<div class="idc-photo" data-ph="'+esc(photoKey(m))+'">'+(ph?'<img src="'+esc(ph)+'" alt="">':esc(initials(m.name)))+'</div>'+
      '<div class="idc-name">'+esc(m.name)+'</div>'+
      '<div class="idc-id">'+esc(m.id)+'</div>'+
      '<div class="idc-rows">'+
        (m.line1?'<div class="idc-r"><span class="k">'+k1+'</span><span class="v">'+esc(m.line1)+'</span></div>':'')+
        (m.line2?'<div class="idc-r"><span class="k">'+k2+'</span><span class="v">'+esc(m.line2)+'</span></div>':'')+
        '<div class="idc-r"><span class="k">Valid thru</span><span class="v">Academic Year 2026–27</span></div>'+
      '</div>'+
    '</div>'+
    '<div class="idc-foot"><div class="idc-bars">'+barsHtml(m.id)+'</div>'+
      '<div class="sg"><b>'+sig+'</b>Authorised signatory · ALIZON OS</div></div>'+
  '</div>';
}

/* ===== shared photo registry (alizonPhotos + sync/phimg_* chunks) ===== */
function photoKey(m){ return (m.role||'').toLowerCase()+':'+String(m.id||'').toLowerCase().replace(/\s+/g,''); }
function photoMap(){ var o=J('alizonPhotos',{}); return (o&&typeof o==='object'&&!Array.isArray(o))?o:{}; }
var phCache={};
function photoUrlFor(m){
  if(m.photo) return m.photo;                 /* legacy inline value */
  var meta=photoMap()[photoKey(m)];
  return (meta&&meta.id&&phCache[meta.id])||'';
}
function whenAuthed(cb,tries){ tries=tries||0;
  try{ if(window.firebase&&firebase.auth&&firebase.auth().currentUser){ cb(true); return; } }catch(e){}
  if(tries>25){ cb(false); return; }
  setTimeout(function(){ whenAuthed(cb,tries+1); },400);
}
function fetchPhoto(meta, cb){
  if(!meta||!meta.id){ cb(''); return; }
  if(phCache[meta.id]){ cb(phCache[meta.id]); return; }
  whenAuthed(function(ok){
    if(!ok||!window.firebase||!firebase.firestore){ cb(''); return; }
    var db=firebase.firestore(), gets=[];
    for(var i=0;i<(meta.chunks||1);i++) gets.push(db.collection('sync').doc('phimg_'+meta.id+'_'+i).get());
    Promise.all(gets).then(function(snaps){
      var b64=snaps.map(function(x){return (x.exists&&x.data()&&x.data().value)||'';}).join('');
      if(!b64){ cb(''); return; }
      phCache[meta.id]='data:image/jpeg;base64,'+b64; cb(phCache[meta.id]);
    }).catch(function(){ cb(''); });
  });
}
function hydratePhotos(scope){
  (scope||document).querySelectorAll('.idc-photo[data-ph]').forEach(function(el){
    if(el.querySelector('img')) return;
    var meta=photoMap()[el.getAttribute('data-ph')];
    if(!meta) return;
    fetchPhoto(meta, function(url){
      if(url&&!el.querySelector('img')) el.innerHTML='<img src="'+url+'" alt="">';
    });
  });
}

/* ---- PNG via canvas (draws fields directly, no external lib) ---- */
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function downloadPng(m){
  function draw(photoUrl){
    var W=640,H=1008,c=document.createElement('canvas');c.width=W;c.height=H;var x=c.getContext('2d');
    x.fillStyle='#fff';roundRect(x,0,0,W,H,28);x.fill();
    /* header band (left-aligned, gold rule) */
    var g=x.createLinearGradient(0,0,W,0);g.addColorStop(0,'#5c0d0d');g.addColorStop(.7,'#8c1515');g.addColorStop(1,'#a31212');
    x.save();roundRect(x,0,0,W,150,28);x.clip();x.fillStyle=g;x.fillRect(0,0,W,150);
    x.fillStyle='#D9A441';x.fillRect(0,144,W,6);x.restore();
    x.fillStyle='#fff';x.textAlign='left';
    x.font='600 27px Georgia, serif';x.fillText('Alizon School of Medical',96,64);
    x.fillText('& Digital Intelligence',96,98);
    x.font='600 13px Inter, sans-serif';x.fillStyle='rgba(255,255,255,.85)';
    x.fillText('T H I R U V A N A N T H A P U R A M  ·  A L I Z O N . I N',96,126);
    /* logo circle placeholder */
    x.fillStyle='rgba(255,255,255,.18)';x.beginPath();x.arc(56,75,26,0,7);x.fill();
    x.fillStyle='#fff';x.font='700 26px Georgia, serif';x.textAlign='center';x.fillText('A',56,85);
    /* role ribbon */
    x.fillStyle='#1b1414';x.fillRect(0,150,W,44);
    x.fillStyle='#D9A441';x.font='800 17px Inter, sans-serif';x.textAlign='center';
    var role=m.role==='Student'?'S T U D E N T   I D E N T I T Y   C A R D':m.role==='Faculty'?'F A C U L T Y   I D E N T I T Y   C A R D':'E M P L O Y E E   I D E N T I T Y   C A R D';
    x.fillText(role,W/2,179);
    /* photo (rounded rect) */
    var pw=224,px0=(W-pw)/2,py0=232;
    x.fillStyle='#D9A441';roundRect(x,px0-8,py0-8,pw+16,pw+16,32);x.fill();
    x.fillStyle='#fff';roundRect(x,px0-4,py0-4,pw+8,pw+8,30);x.fill();
    function drawInitials(){
      var ag=x.createLinearGradient(px0,py0,px0+pw,py0+pw);ag.addColorStop(0,'#7a1010');ag.addColorStop(1,'#a31212');
      x.save();roundRect(x,px0,py0,pw,pw,26);x.clip();x.fillStyle=ag;x.fillRect(px0,py0,pw,pw);
      x.fillStyle='#fff';x.font='700 84px Georgia, serif';x.textAlign='center';x.textBaseline='middle';
      x.fillText(initials(m.name),W/2,py0+pw/2+6);x.textBaseline='alphabetic';x.restore();
    }
    function finalize(){
      x.textAlign='center';
      x.fillStyle='#231D1E';x.font='700 38px Georgia, serif';x.fillText(m.name,W/2,548);
      /* id pill */
      x.font='700 24px monospace';var idw=x.measureText(m.id).width+56;
      x.fillStyle='rgba(140,21,21,.08)';roundRect(x,(W-idw)/2,566,idw,44,22);x.fill();
      x.strokeStyle='rgba(140,21,21,.25)';x.lineWidth=2;roundRect(x,(W-idw)/2,566,idw,44,22);x.stroke();
      x.fillStyle='#7A0309';x.fillText(m.id,W/2,597);
      /* detail rows */
      var rows=[], k1=m.role==='Student'?'PROGRAMME':'DESIGNATION',
          k2=m.role==='Student'?'BATCH':(m.role==='Faculty'?'DEPARTMENT':'OFFICE');
      if(m.line1) rows.push([k1,m.line1]);
      if(m.line2) rows.push([k2,m.line2]);
      rows.push(['VALID THRU','Academic Year 2026-27']);
      var ry=668;
      rows.forEach(function(rr){
        x.textAlign='left';x.fillStyle='#9a8a6a';x.font='800 15px Inter, sans-serif';x.fillText(rr[0],60,ry);
        x.fillStyle='#231D1E';x.font='600 21px Inter, sans-serif';
        var val=String(rr[1]); if(val.length>38) val=val.slice(0,37)+'…';
        x.fillText(val,240,ry);
        x.strokeStyle='rgba(0,0,0,.08)';x.setLineDash([4,5]);x.beginPath();x.moveTo(60,ry+16);x.lineTo(W-60,ry+16);x.stroke();x.setLineDash([]);
        ry+=54;
      });
      /* footer */
      x.fillStyle='#7A0309';x.fillRect(0,H-96,W,6);
      var s2=String(m.id||'0'),bx=52;
      x.fillStyle='#7A0309';
      for(var i=0;i<40;i++){var code=s2.charCodeAt(i%s2.length)||48;var bw=(code%3)+1;var bh=14+((code*(i+3))%28);x.fillRect(bx,H-30-bh,bw,bh);bx+=bw+3;}
      x.textAlign='right';x.font='italic 700 22px Georgia, serif';x.fillStyle='#231D1E';
      x.fillText(m.role==='Student'?'Registrar':'HR Office',W-52,H-56);
      x.font='700 12px Inter, sans-serif';x.fillStyle='#8A8384';
      x.fillText('AUTHORISED SIGNATORY · ALIZON OS',W-52,H-34);
      var url;
      try{ url=c.toDataURL('image/png'); }
      catch(e){ drawInitials(); try{ url=c.toDataURL('image/png'); }catch(e2){ return; } }
      var a=document.createElement('a');a.href=url;
      a.download='ALIZON_ID_'+String(m.id).replace(/[^A-Za-z0-9]+/g,'_')+'.png';
      document.body.appendChild(a);a.click();a.remove();
    }
    if(photoUrl){
      var img=new Image();
      img.onload=function(){
        x.save();roundRect(x,px0,py0,pw,pw,26);x.clip();
        var sc=Math.max(pw/img.width,pw/img.height);
        x.drawImage(img,px0+(pw-img.width*sc)/2,py0+(pw-img.height*sc)/2,img.width*sc,img.height*sc);
        x.restore();finalize();
      };
      img.onerror=function(){ drawInitials();finalize(); };
      img.src=photoUrl;
    } else { drawInitials();finalize(); }
  }
  var meta=photoMap()[photoKey(m)];
  if(m.photo) draw(m.photo);
  else if(meta) fetchPhoto(meta,function(url){ draw(url||''); });
  else draw('');
}
function printOne(m){$('printArea').className='';$('printArea').innerHTML=cardHtml(m);hydratePhotos($('printArea'));setTimeout(function(){window.print();},350);}

/* ---- state + rendering ---- */
var CAT='student', current=null;
function renderList(){
  var q=($('search').value||'').toLowerCase().trim();
  var list=listFor(CAT).filter(function(m){return !q||m.search.indexOf(q)>-1;});
  var el=$('plist');
  if(!list.length){ el.innerHTML='<div class="empty">No '+CAT+' records found.<br><small>Add them from the back end first.</small></div>'; return; }
  el.innerHTML=list.map(function(m,i){return '<div class="prow'+(current&&current.id===m.id?' on':'')+'" data-i="'+i+'"><b>'+esc(m.name)+'</b><small>'+esc(m.id)+(m.batch&&m.batch!=='Staff'&&m.batch!=='Faculty'?' · '+esc(m.batch):'')+'</small></div>';}).join('');
  el.querySelectorAll('.prow').forEach(function(row){ row.addEventListener('click',function(){ select(list[+row.dataset.i]); }); });
}
function select(m){
  current=m;
  var isAdmin=(sessionStorage.getItem('alizonAdminAuth')==='1')||!!(new URLSearchParams(location.search).get('admin'));
  $('stage').innerHTML=cardHtml(m)+
    '<div class="btnrow"><button class="abtn primary" id="dlPng">⬇ Download ID card (PNG)</button>'+
    '<button class="abtn" id="prCard">Print / Save as PDF</button></div>'+
    (isAdmin?'<div class="phbar"><input type="file" id="phFile" accept="image/*"><button class="abtn" id="phUp">Upload photo</button>'+
      (photoMap()[photoKey(m)]?'<button class="abtn" id="phRm">Remove photo</button>':'')+
      '<span class="stagehint" id="phMsg"></span></div>':'')+
    '<div class="stagehint">Photo-less cards use initials. Photos upload once and appear on ID cards, portals and testimonials.</div>';
  $('dlPng').addEventListener('click',function(){downloadPng(m);});
  $('prCard').addEventListener('click',function(){printOne(m);});
  if(isAdmin){
    var up=$('phUp'); if(up) up.addEventListener('click',function(){ adminUpload(m); });
    var rm=$('phRm'); if(rm) rm.addEventListener('click',function(){ adminRemove(m); });
  }
  hydratePhotos($('stage'));
  renderList();
}

/* ---- admin: upload / remove a person's photo (shared registry) ---- */
function dscale(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){ var im=new Image();
      im.onload=function(){
        var sc=Math.min(1,512/Math.max(im.width,im.height));
        var cv=document.createElement('canvas');cv.width=Math.round(im.width*sc);cv.height=Math.round(im.height*sc);
        cv.getContext('2d').drawImage(im,0,0,cv.width,cv.height);
        res(cv.toDataURL('image/jpeg',.82).split(',')[1]);
      };
      im.onerror=rej; im.src=String(r.result);
    };
    r.onerror=rej; r.readAsDataURL(file);
  });
}
function savePhotoMap(map){
  var json=JSON.stringify(map);
  try{ localStorage.setItem('alizonPhotos', json); }catch(e){}
  whenAuthed(function(ok){
    if(ok&&window.firebase&&firebase.firestore){
      firebase.firestore().collection('sync').doc('alizonPhotos').set({ value:json,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp() }).catch(function(){});
    }
  });
}
function adminUpload(m){
  var f=$('phFile'), msg=$('phMsg');
  var file=f&&f.files&&f.files[0];
  if(!file){ if(msg) msg.textContent='Choose an image first.'; return; }
  if(msg) msg.textContent='Uploading…';
  dscale(file).then(function(b64){
    whenAuthed(function(ok){
      if(!ok||!window.firebase||!firebase.firestore){ if(msg) msg.textContent='Cloud not ready — try again.'; return; }
      var db=firebase.firestore();
      var id='PH'+Date.now(), CH=700000, n=Math.ceil(b64.length/CH), writes=[];
      for(var i=0;i<n;i++) writes.push(db.collection('sync').doc('phimg_'+id+'_'+i).set({value:b64.slice(i*CH,(i+1)*CH)}));
      Promise.all(writes).then(function(){
        var map=photoMap(); var old=map[photoKey(m)];
        map[photoKey(m)]={id:id,chunks:n}; savePhotoMap(map);
        try{ if(old&&old.id){ for(var j=0;j<(old.chunks||1);j++) db.collection('sync').doc('phimg_'+old.id+'_'+j).delete().catch(function(){}); } }catch(e){}
        phCache[id]='data:image/jpeg;base64,'+b64;
        if(msg) msg.textContent='Photo saved ✓';
        select(m);
      }).catch(function(){ if(msg) msg.textContent='Upload failed — try again.'; });
    });
  }).catch(function(){ if(msg) msg.textContent='Could not read that image.'; });
}
function adminRemove(m){
  var map=photoMap(); var old=map[photoKey(m)];
  if(!old) return;
  delete map[photoKey(m)]; savePhotoMap(map);
  try{ if(window.firebase&&firebase.firestore){ var db=firebase.firestore();
    for(var j=0;j<(old.chunks||1);j++) db.collection('sync').doc('phimg_'+old.id+'_'+j).delete().catch(function(){}); } }catch(e){}
  select(m);
}

/* ---- bulk ---- */
function batches(){
  var set={}; students().forEach(function(s){ if(s.batch) set[s.batch]=1; });
  return Object.keys(set).sort();
}
function renderBulk(){
  var sel=$('bulkBatch');
  if(CAT==='student'){
    sel.style.display='';
    sel.innerHTML='<option value="__all">All students</option>'+batches().map(function(b){return '<option value="'+esc(b)+'">Batch '+esc(b)+'</option>';}).join('');
  } else { sel.style.display='none'; }
  drawSheet();
}
function drawSheet(){
  var list=listFor(CAT);
  if(CAT==='student'){ var b=$('bulkBatch').value; if(b&&b!=='__all') list=list.filter(function(m){return String(m.batch)===String(b);}); }
  $('bulkCount').textContent=list.length+' card'+(list.length!==1?'s':'');
  $('bulkSheet').innerHTML=list.length?list.map(cardHtml).join(''):'<div class="empty">No records for this selection.</div>';
  hydratePhotos($('bulkSheet'));
}
function printAll(){
  var list=listFor(CAT);
  if(CAT==='student'){ var b=$('bulkBatch').value; if(b&&b!=='__all') list=list.filter(function(m){return String(m.batch)===String(b);}); }

  $('printArea').className='sheet';$('printArea').innerHTML=list.map(cardHtml).join('');hydratePhotos($('printArea'));setTimeout(function(){window.print();},600);
}

/* ---- access control + init ---- */
(function(){
  var p=new URLSearchParams(location.search);
  var norm=function(v){return String(v||'').toLowerCase().replace(/\s+/g,'');};
  var isAdmin=(sessionStorage.getItem('alizonAdminAuth')==='1')||!!(p.get('admin'));
  var t=(p.get('type')||'student').toLowerCase(); if(['student','faculty','employee'].indexOf(t)<0)t='student';
  CAT=t;
  $('cats').querySelectorAll('[data-cat]').forEach(function(x){x.classList.toggle('on',x.dataset.cat===t);});

  var id=p.get('id');

  /* -- 1. portal deep-link ?id= : show ONLY that person's card, nothing else browsable -- */
  if(id){
    $('listPanel').style.display='none';
    $('single').classList.add('solo');
    $('cats').style.display='none';
    $('bulkBtn').style.display='none';
    $('bulk').style.display='none';
    var hit=listFor(t).filter(function(m){return norm(m.id)===norm(id);})[0];
    if(hit){ select(hit); setTimeout(function(){ try{document.querySelector('.idcard').scrollIntoView({block:'center'});}catch(e){} },50); }
    else { $('stage').innerHTML='<div class="empty">No '+t+' record found for <b>'+esc(id)+'</b>.<br><small>Ask the office to add/sync your details, then reload.</small></div>'; }
    return;
  }

  /* -- 2. admin : full experience -- */
  if(isAdmin){
    renderList();
    return;
  }

  /* -- 3. regular user : self-service lookup only, never a roster -- */
  $('cats').style.display='none';
  $('single').style.display='none';
  $('bulk').style.display='none';
  $('bulkBtn').style.display='none';
  $('selfLookup').style.display='';

  var selfCat=t;
  $('selfCats').querySelectorAll('[data-cat]').forEach(function(x){x.classList.toggle('on',x.dataset.cat===selfCat);});
  $('selfCats').querySelectorAll('[data-cat]').forEach(function(b){
    b.addEventListener('click',function(){
      $('selfCats').querySelectorAll('[data-cat]').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on'); selfCat=b.dataset.cat; $('selfStage').innerHTML='';
    });
  });
  function selfFind(){
    var q=$('selfId').value;
    if(!norm(q)){ $('selfStage').innerHTML='<div class="empty">Please enter your ID.</div>'; return; }
    var m=listFor(selfCat).filter(function(x){return norm(x.id)===norm(q);})[0];
    if(!m){ $('selfStage').innerHTML='<div class="empty">No '+selfCat+' record found for <b>'+esc(q)+'</b>.<br><small>Check your ID or ask the office to sync your details.</small></div>'; return; }
    $('selfStage').innerHTML=cardHtml(m)+
      '<div class="btnrow"><button class="abtn primary" id="selfDl">⬇ Download ID card (PNG)</button>'+
      '<button class="abtn" id="selfPr">Print / Save as PDF</button></div>';
    $('selfDl').addEventListener('click',function(){downloadPng(m);});
    $('selfPr').addEventListener('click',function(){printOne(m);});
    hydratePhotos($('selfStage'));
  }
  $('selfGo').addEventListener('click',selfFind);
  $('selfId').addEventListener('keydown',function(e){ if(e.key==='Enter') selfFind(); });
})();
